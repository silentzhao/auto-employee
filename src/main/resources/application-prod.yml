spring:
  flyway:
    baseline-on-migrate: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:employee_manager}
    username: ${DB_USERNAME:app}
    password: ${DB_PASSWORD:change-me}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      pool-name: employee-manager-pool
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MILLIS:3000}

logging:
  level:
    root: info
    com.aidigital.employee: info
